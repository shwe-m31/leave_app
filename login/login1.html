<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to right, #4A90E2, #9013FE);
        }
        @keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.login-container {
    animation: fadeInUp 0.6s ease-out;
}
        .login-container {
            background: linear-gradient(to right, #4A90E2, #9013FE);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0.5, 0.5, 0.5, 0.5);
            text-align: center;
            width: 350px;
        }
        .login-container h2 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        .tab-buttons {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .tab-buttons button {
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            background: #f0f0f0;
            margin: 0 5px;
            border-radius: 5px;
            font-weight: 600;
        }
        .tab-buttons button.active {
            background: blue;
            color: white;
        }
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .forgot-password {
            text-align: right;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .forgot-password a {
            color: blue;
            text-decoration: none;
        }
        .login-btn {
            background:blue;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration-line: none;
        }
        .terms {
            font-size: 0.8rem;
            margin-top: 1rem;
        }
        .terms a {
            color: blue;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Welcome back</h2>
        <p>Sign in to your account</p>
        <div class="tab-buttons">
            <button class="active" id="student-btn">Student</button>
            <button id="admin-btn">Administrator</button>
        </div>
        <form action="#" method="post">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <div class="forgot-password">
            <a href="#">Forgot password?</a>
        </div>
        
        <button class="login-btn" id="sign-in-button" onclick="location.href='../student/student.html'">Sign in to Student Portal</a></button>
    </form>
        <p class="terms">By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
    </div>
    <script>
        const studentBtn = document.getElementById("student-btn");
        const adminBtn = document.getElementById("admin-btn");
        const signInButton = document.getElementById("sign-in-button");
        document.querySelector("form").addEventListener("submit", function(event) {
        event.preventDefault(); // Prevent page reload
        });
        const formData = {
            name: document.getElementById("username").value,
            password: document.getElementById("password").value
          
        };
    
        document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault(); // Prevent form from reloading the page

    const usernameInput = document.getElementById("usernameInput").value; // Get username input
    const passwordInput = document.getElementById("passwordInput").value; // Get password input

    console.log("Username entered:", usernameInput); // Debugging

    const formData = {
        name: usernameInput, 
        password: passwordInput
    };

    fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
    })
    .then(response => response.json())
    .then(data => {
        console.log("Server response:", data); // Debugging

        if (data.message === "Login successful") {
            localStorage.setItem("username", usernameInput); // Store username
            console.log("Username saved in localStorage:", localStorage.getItem("username")); // Debugging
            window.location.href = "../student/student.html"; // Redirect to student page
        } else {
            alert("Invalid name or password");
        }
    })
    .catch(error => console.error("Error:", error));
});
    </script>
</body>
</html>
